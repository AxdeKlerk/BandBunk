{% extends 'base.html' %}
{% block title %}Contact{% endblock %}
{% block content %}
<div class="container section">
  <div class="container--narrow" style="margin:0 auto;">
    <h1 class="mb-2">Contact BandBunk</h1>
    <p class="text-muted mb-4">Got a question, a report, or just want to say hello?</p>
    <div class="card p-4">
      <form>
        <div class="form-group"><label>Your name</label><input type="text" placeholder="Your name"></div>
        <div class="form-group"><label>Email</label><input type="email" placeholder="you@example.com"></div>
        <div class="form-group"><label>Subject</label>
          <select><option>General question</option><option>Report a listing</option><option>Report a user</option><option>Payment issue</option><option>Other</option></select>
        </div>
        <div class="form-group"><label>Message</label><textarea rows="5" placeholder="Tell us what's going on..."></textarea></div>
        <button type="submit" class="btn btn--primary">Send Message</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
